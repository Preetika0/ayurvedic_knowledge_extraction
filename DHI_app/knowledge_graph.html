        <center>
          <h1></h1>

        <style type="text/css">

             #mynetwork {
                 width: 100%;
                 height: 700px;
                 background-color: #0B1220;
                 border: 1px solid lightgray;
                 position: relative;
                 float: left;
             }

             

             

             
        </style>

    <body>
        <div class="card" style="width: 100%">
            
            
            <div id="mynetwork" class="card-body"></div>
        </div>

        
        

        <script type="text/javascript">

              // initialize global variables.
              var edges;
              var nodes;
              var allNodes;
              var allEdges;
              var nodeColors;
              var originalNodes;
              var network;
              var container;
              var options, data;
              var filter = {
                  item : '',
                  property : '',
                  value : []
              };

              

              

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#ef4444", "font": {"color": "white"}, "id": "Warfarin", "label": "Warfarin", "shape": "dot", "size": 10, "title": "Drug"}, {"color": "#3b82f6", "font": {"color": "white"}, "id": "Anticoagulant", "label": "Anticoagulant", "shape": "dot", "size": 10, "title": "Drug Class"}, {"color": "#10b981", "font": {"color": "white"}, "id": "Neem", "label": "Neem", "shape": "dot", "size": 10, "title": "Herb"}, {"color": "#f97316", "font": {"color": "white"}, "id": "Increased bleeding risk", "label": "Increased bleeding risk", "shape": "dot", "size": 10, "title": "Interaction Effect"}, {"color": "#f59e0b", "font": {"color": "white"}, "id": "Azadirachtin", "label": "Azadirachtin", "shape": "dot", "size": 10, "title": "Compound"}, {"color": "#8b5cf6", "font": {"color": "white"}, "id": "Thrombosis", "label": "Thrombosis", "shape": "dot", "size": 10, "title": "Disease"}, {"color": "#ec4899", "font": {"color": "white"}, "id": "Antiplatelet activity", "label": "Antiplatelet activity", "shape": "dot", "size": 10, "title": "Mechanism"}, {"color": "#dc2626", "font": {"color": "white"}, "id": "High", "label": "High", "shape": "dot", "size": 10, "title": "Risk"}]);
                  edges = new vis.DataSet([{"from": "Warfarin", "label": "belongs_to", "to": "Anticoagulant", "width": 1}, {"from": "Warfarin", "label": "interacts_with", "to": "Neem", "width": 1}, {"from": "Warfarin", "label": "causes", "to": "Increased bleeding risk", "width": 1}, {"from": "Neem", "label": "contains", "to": "Azadirachtin", "width": 1}, {"from": "Neem", "label": "used_for", "to": "Thrombosis", "width": 1}, {"from": "Increased bleeding risk", "label": "via", "to": "Antiplatelet activity", "width": 1}, {"from": "Increased bleeding risk", "label": "risk_level", "to": "High", "width": 1}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {
    "configure": {
        "enabled": false
    },
    "edges": {
        "color": {
            "inherit": true
        },
        "smooth": {
            "enabled": true,
            "type": "dynamic"
        }
    },
    "interaction": {
        "dragNodes": true,
        "hideEdgesOnDrag": false,
        "hideNodesOnDrag": false
    },
    "physics": {
        "enabled": true,
        "repulsion": {
            "centralGravity": 0.2,
            "damping": 0.09,
            "nodeDistance": 250,
            "springConstant": 0.05,
            "springLength": 200
        },
        "solver": "repulsion",
        "stabilization": {
            "enabled": true,
            "fit": true,
            "iterations": 1000,
            "onlyDynamicEdges": false,
            "updateInterval": 50
        }
    }
};

                  


                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  

                  return network;

              }
              drawGraph();
        </script>
